[package]
name = "aria-msgpack"
version = "0.11.2"
description = "MessagePack binary serialization — Aria + aria-libc_mem"
license = "MIT"
repository = "https://github.com/alternative-intelligence-cp/aria-packages"
categories = ["serialization", "binary"]

[dependencies]
aria-libc = "0.10.0"

[build]
type = "library"
entry = "src/aria_msgpack.aria"
link_libraries = ["aria_libc_mem"]
