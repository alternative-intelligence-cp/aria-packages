[package]
name = "aria-opengl"
version = "0.1.0"
authors = ["Aria Language Project"]
license = "Apache-2.0 WITH Runtime-Library-Exception"
description = "OpenGL 3.3 Core bindings for Aria — shaders, buffers, textures, 3D math, via SDL2 windowing + GLAD loader"
keywords = ["opengl", "graphics", "3d", "gpu", "gamedev", "ffi"]
categories = ["graphics", "gamedev"]

[dependencies]

[build]
type = "library"
entry = "src/aria_opengl.aria"
link_libraries = ["aria_opengl_shim", "SDL2", "GL"]
