[package]
name        = "aria-libc"
version     = "0.9.0"
description = "Standard C library wrappers for Aria — libc without the boilerplate"
license     = "Apache-2.0"
repository  = "https://github.com/alternative-intelligence-cp/aria-libc"
authors     = ["Alternative Intelligence"]
keywords    = ["libc", "musl", "static", "ffi", "system", "memory", "string", "math", "time", "process", "networking", "posix", "filesystem", "regex"]
categories  = ["system", "ffi"]

[dependencies]

[build]
link_libraries = ["aria_libc_io", "aria_libc_mem", "aria_libc_string", "aria_libc_math", "aria_libc_time", "aria_libc_process", "aria_libc_net", "aria_libc_posix", "aria_libc_fs", "aria_libc_regex"]
